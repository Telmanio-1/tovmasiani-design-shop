<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="theme-color" content="#f2f0e9" />
    <title>Результат оплаты — neServices</title>
    <style>
      :root {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        color: #171717;
        background: #f2f0e9;
        --ink: #171717;
        --lime: #c7ff37;
        --orange: #ff6a3d;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f2f0e9;
      }
      .card {
        width: min(620px, 100%);
        padding: clamp(30px, 6vw, 62px);
        border: 1px solid var(--ink);
        background: #fff;
        box-shadow: 10px 10px 0 var(--lime);
        text-align: center;
      }
      .icon {
        width: 76px;
        height: 76px;
        margin: 0 auto 24px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--lime);
        font-size: 32px;
        font-weight: 900;
      }
      .icon.fail {
        background: #ffd9d1;
        color: #9c2114;
      }
      .eyebrow {
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 0.13em;
        text-transform: uppercase;
      }
      h1 {
        margin: 18px 0;
        font:
          900 clamp(36px, 7vw, 58px)/0.95 "Arial Black",
          Arial,
          sans-serif;
        letter-spacing: -0.05em;
        text-transform: uppercase;
      }
      p {
        max-width: 460px;
        margin: 0 auto 26px;
        color: #69655e;
        font-size: 14px;
        line-height: 1.65;
      }
      .order {
        display: block;
        margin-bottom: 25px;
        color: #77736c;
        font-size: 10px;
      }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .actions a {
        padding: 16px;
        border: 1px solid var(--ink);
        text-decoration: none;
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .actions a:first-child {
        background: var(--ink);
        color: #fff;
      }
      @media (max-width: 520px) {
        .actions {
          grid-template-columns: 1fr;
        }
        .card {
          box-shadow: 6px 6px 0 var(--lime);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="icon" id="icon">✓</div>
      <span class="eyebrow">neServices / T‑Банк</span>
      <h1 id="title">Оплата завершена</h1>
      <p id="copy">
        Банк подтвердил переход после оплаты. Электронный чек и материалы заказа
        будут отправлены на указанный email.
      </p>
      <span class="order" id="order"></span>
      <div class="actions">
        <a href="subscription.html">Управление подпиской</a>
        <a href="./">Вернуться в магазин</a>
      </div>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const failed = params.get("status") === "fail";
      const order = params.get("order");
      if (failed) {
        document.querySelector("#icon").textContent = "!";
        document.querySelector("#icon").classList.add("fail");
        document.querySelector("#title").textContent = "Оплата не прошла";
        document.querySelector("#copy").textContent =
          "Банк не подтвердил платёж. Деньги не списаны. Вернитесь в магазин и попробуйте ещё раз или выберите другой способ оплаты.";
      }
      if (order) {
        document.querySelector("#order").textContent = `Заказ: ${order}`;
      }
    </script>
  </body>
</html>
